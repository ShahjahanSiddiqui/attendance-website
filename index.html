<!DOCTYPE html>
<html>
<head>
<title>Attendance Dashboard</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#2c7be5;
color:white;
}

h1{
color:#333;
}
</style>

</head>

<body>

<h1>Student Attendance</h1>

<table id="sheetTable"></table>

<script>

const sheetURL = "https://opensheet.elk.sh/2PACX-1vSMG_Yry35kTzPBFrdolRgpHFC2FxomWBfaJ7q0tymYiwEIsJRsEUta9K_brdBuUL_-l3a6w10DwvcD/Sheet1";

fetch(sheetURL)
.then(res => res.json())
.then(data => {

let table = document.getElementById("sheetTable");

let headers = Object.keys(data[0]);

let headerRow = "<tr>";
headers.forEach(h => headerRow += `<th>${h}</th>`);
headerRow += "</tr>";

table.innerHTML += headerRow;

data.forEach(row=>{
let rowHTML="<tr>";
headers.forEach(h=>{
rowHTML += `<td>${row[h]}</td>`;
});
rowHTML+="</tr>";
table.innerHTML += rowHTML;
});

});

</script>

</body>
</html>
