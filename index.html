<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSC Super 30 Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body{font-family:Arial;background:#f1f5f9}
.loader{border-top-color:#3498db;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.status-present{background:#dcfce7;color:#166534}
.status-absent{background:#fee2e2;color:#991b1b}
</style>

</head>

<body>

<div id="loading" class="fixed inset-0 flex items-center justify-center bg-white">
<div class="loader border-4 border-gray-200 h-12 w-12 rounded-full"></div>
</div>

<div class="p-6">

<h1 class="text-2xl font-bold mb-6">SSC Super 30 Attendance Dashboard</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

<div class="bg-white p-4 rounded-xl shadow">
<p class="text-gray-500">Total Students</p>
<h2 class="text-3xl font-bold" id="total">0</h2>
</div>

<div class="bg-white p-4 rounded-xl shadow">
<p class="text-gray-500">Present</p>
<h2 class="text-3xl font-bold" id="present">0</h2>
</div>

<div class="bg-white p-4 rounded-xl shadow">
<p class="text-gray-500">Attendance %</p>
<h2 class="text-3xl font-bold" id="percent">0%</h2>
</div>

</div>

<input id="search" placeholder="Search student..." class="border p-2 rounded w-full mb-4">

<div class="bg-white rounded-xl shadow overflow-auto">

<table class="w-full text-left">

<thead class="bg-gray-100 text-sm">
<tr>
<th class="p-3">Name</th>
<th class="p-3">Date</th>
<th class="p-3">Status</th>
<th class="p-3">Fajr</th>
<th class="p-3">Zuhr</th>
<th class="p-3">Asr</th>
<th class="p-3">Maghrib</th>
<th class="p-3">Isha</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vREs3GowLWu8vbOp0HZ2dcfve_U2ZKJDqYzNLu-hbPjq_cA0j1yQr5UpXs8iUA2nW54BpMeaFpVUZhT/pub?output=csv"

let data=[]

function loadData(){

fetch(CSV_URL)
.then(res=>res.text())
.then(text=>{

const rows=text.split("\n").map(r=>r.split(","))

data=rows.slice(1)

renderTable(data)

document.getElementById("total").innerText=data.length

let present=data.filter(r=>r[2]?.toLowerCase()=="present").length
document.getElementById("present").innerText=present

document.getElementById("percent").innerText=
data.length?Math.round((present/data.length)*100)+"%":"0%"

document.getElementById("loading").style.display="none"

})

}

function renderTable(rows){

const table=document.getElementById("table")

table.innerHTML=""

rows.forEach(r=>{

table.innerHTML+=`

<tr class="border-b">

<td class="p-3 font-medium">${r[0]||""}</td>

<td class="p-3">${r[1]||""}</td>

<td class="p-3">
<span class="px-2 py-1 rounded text-xs ${
(r[2]||"").toLowerCase()=="present"?"status-present":"status-absent"
}">
${r[2]||""}
</span>
</td>

<td class="p-3">${r[3]||""}</td>
<td class="p-3">${r[4]||""}</td>
<td class="p-3">${r[5]||""}</td>
<td class="p-3">${r[6]||""}</td>
<td class="p-3">${r[7]||""}</td>

</tr>

`

})

}

document.getElementById("search").addEventListener("input",e=>{

let val=e.target.value.toLowerCase()

renderTable(data.filter(r=>r[0]?.toLowerCase().includes(val)))

})

loadData()

setInterval(loadData,30000)

</script>

</body>
</html>
