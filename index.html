<!DOCTYPE html>
<html>
<head>
<title>Student Attendance</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#2c7be5;
color:white;
}

</style>

</head>

<body>

<h1>Student Attendance</h1>

<table id="sheetTable"></table>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMG_Yry35kTzPBFrdolRgpHFC2FxomWBfaJ7q0tymYiwEIsJRsEUta9K_brdBuUL_-l3a6w10DwvcD/pub?output=csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {

let rows = data.split("\n");
let table = document.getElementById("sheetTable");

rows.forEach((row,i)=>{
let cols = row.split(",");
let tr = "<tr>";

cols.forEach(col=>{
if(i==0){
tr += "<th>"+col+"</th>";
}else{
tr += "<td>"+col+"</td>";
}
});

tr += "</tr>";
table.innerHTML += tr;

});

});

</script>

</body>
</html>
